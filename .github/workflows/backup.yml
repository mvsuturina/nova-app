name: Daily Backup

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC = midnight PDT
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch data from Supabase
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UID: ${{ secrets.NOVA_USER_ID }}
        run: |
          H1="apikey: $KEY"
          H2="Authorization: Bearer $KEY"
          DATE=$(date +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV

          get() {
            local table=$1
            curl -sf \
              -H "$H1" -H "$H2" \
              "$URL/rest/v1/$table?user_id=eq.$UID&select=*&order=created_at.asc&limit=10000" \
              || echo '[]'
          }

          # answers linked via session_id — fetch all, filter later
          answers=$(curl -sf \
            -H "$H1" -H "$H2" \
            "$URL/rest/v1/daily_survey_answers?select=*&order=answered_at.asc&limit=10000" \
            || echo '[]')

          # snapshots linked via score_id — fetch all for this user via scores join
          snapshots=$(curl -sf \
            -H "$H1" -H "$H2" \
            "$URL/rest/v1/daily_score_snapshots?select=*&order=created_at.asc&limit=10000" \
            || echo '[]')

          jq -n \
            --arg  date      "$DATE" \
            --arg  uid       "$UID" \
            --argjson scores    "$(get daily_scores)" \
            --argjson sessions  "$(get daily_survey_sessions)" \
            --argjson answers   "$answers" \
            --argjson snapshots "$snapshots" \
            --argjson meals     "$(get meal_log)" \
            --argjson recipes   "$(get saved_recipes)" \
            --argjson water     "$(get water_log)" \
            --argjson activity  "$(get activity_log)" \
            --argjson goals     "$(get mini_goals)" \
            --argjson tasks     "$(get daily_tasks)" \
            --argjson journals  "$(get journal_entries)" \
            --argjson hunger    "$(get hunger_log)" \
            --argjson emotions  "$(get emotion_log)" \
            '{
              exported_at: $date,
              user_id:     $uid,
              scores:      $scores,
              sessions:    $sessions,
              answers:     $answers,
              snapshots:   $snapshots,
              meals:       $meals,
              recipes:     $recipes,
              water:       $water,
              activity:    $activity,
              goals:       $goals,
              tasks:       $tasks,
              journals:    $journals,
              hunger:      $hunger,
              emotions:    $emotions
            }' > "nova-backup-${DATE}.json"

          echo "Done. Size: $(wc -c < nova-backup-${DATE}.json) bytes"

      - name: Save as artifact
        uses: actions/upload-artifact@v5
        with:
          name: nova-backup-${{ env.DATE }}
          path: nova-backup-*.json
          retention-days: 90
