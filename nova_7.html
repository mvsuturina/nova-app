<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOVA">
<meta name="theme-color" content="#08070f">
<title>NOVA — Твой агент</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08070f;
    --bg2: #0e0c18;
    --bg3: #13111f;
    --border: #1e1a30;
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    --purple-dim: #2d1f4e;
    --text: #e8e0ff;
    --text-dim: #9b85c4;
    --text-muted: #5a4f7a;
    --text-faint: #3d3560;
    --green: #10b981;
    --gold: #f59e0b;
  }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  /* SETUP */
  #setup-screen {
    overflow-y: auto;
    padding: 48px 24px 40px;
  }
  .setup-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    letter-spacing: 12px;
    color: var(--purple-light);
    text-align: center;
    margin-bottom: 6px;
    font-weight: 300;
  }
  .setup-sub {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 40px;
    font-family: 'Cormorant Garamond', serif;
  }
  .field-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }
  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid #2d2550;
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Jost', sans-serif;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--purple); }
  .goals-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .save-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple), #5b21b6);
    border: none;
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-size: 15px;
    font-family: 'Jost', sans-serif;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.8; }

  /* HOME */
  #home-screen { overflow: hidden; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--bg3);
    flex-shrink: 0;
  }
  .logo-small {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    letter-spacing: 6px;
    color: var(--purple-light);
    font-weight: 300;
  }
  .time-display { font-size: 11px; color: var(--text-faint); margin-top: 2px; letter-spacing: 1px; }
  .settings-btn {
    background: none; border: none; font-size: 20px;
    cursor: pointer; opacity: 0.4; padding: 4px;
  }
  .home-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 18px 100px;
    -webkit-overflow-scrolling: touch;
  }

  /* GREETING CARD */
  .greet-card {
    background: linear-gradient(135deg, #1a0d33 0%, #0d1b2a 100%);
    border: 1px solid var(--purple-dim);
    border-radius: 18px;
    padding: 20px;
    margin-top: 18px;
    margin-bottom: 22px;
    animation: fadeUp 0.4s ease;
  }
  .greet-hello {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 6px;
    font-weight: 300;
  }
  .greet-focus {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .greet-focus span { color: var(--purple-light); }
  .progress-label { font-size: 10px; letter-spacing: 2px; color: var(--text-faint); margin-bottom: 6px; }
  .progress-bar { background: #1a1530; border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--purple-light));
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  /* SECTION */
  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-faint);
    margin-bottom: 10px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* BLOCK CARD */
  .block-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4px 16px;
    margin-bottom: 20px;
  }
  .task-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 11px 0;
    border-bottom: 1px solid var(--bg3);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row.done { opacity: 0.35; }
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid #4c3d8a;
    background: transparent;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: white;
    margin-top: 1px;
    transition: all 0.2s;
  }
  .task-check.checked { background: var(--purple); border-color: var(--purple); }
  .task-text { font-size: 14px; color: #d4caff; line-height: 1.5; }
  .task-row.done .task-text { text-decoration: line-through; color: var(--text-muted); }

  /* BLOCK TABS */
  .block-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .block-tab {
    flex: 1; padding: 11px 6px;
    border-radius: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    font-family: 'Jost', sans-serif;
    transition: all 0.2s;
  }
  .block-tab.active {
    background: var(--purple-dim);
    border-color: var(--purple);
    color: var(--purple-light);
  }
  .block-tab .tab-emoji { font-size: 18px; display: block; margin-bottom: 3px; }

  /* PROMPT GRID */
  .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .prompt-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    cursor: pointer;
    text-align: center;
    font-family: 'Jost', sans-serif;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .prompt-btn:active { background: var(--bg3); transform: scale(0.97); }
  .prompt-emoji { font-size: 22px; display: block; margin-bottom: 6px; }
  .prompt-label { font-size: 12px; color: var(--purple-light); line-height: 1.4; }

  /* CHAT INPUT on home */
  .home-input-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .home-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid #2d2550;
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Jost', sans-serif;
    outline: none;
  }
  .home-input:focus { border-color: var(--purple); }
  .send-btn {
    background: var(--purple);
    border: none;
    border-radius: 14px;
    width: 48px;
    color: white;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .send-btn:active { opacity: 0.7; }
  .send-btn:disabled { opacity: 0.3; cursor: default; }

  /* CHAT SCREEN */
  #chat-screen { overflow: hidden; }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--bg3);
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none;
    color: var(--purple-light); cursor: pointer;
    font-size: 14px; font-family: 'Jost', sans-serif;
    padding: 4px 0;
  }
  .chat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; letter-spacing: 4px;
    color: var(--purple-light); font-weight: 300;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-empty {
    color: var(--text-faint);
    font-size: 14px;
    text-align: center;
    margin-top: 60px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }
  .msg {
    display: flex;
    max-width: 82%;
  }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: #5b21b6;
    color: var(--text);
    border-radius: 18px 18px 4px 18px;
  }
  .msg.assistant .msg-bubble {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
  }
  .typing {
    display: flex; gap: 5px;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    width: fit-content;
    align-self: flex-start;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--purple);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .chat-input-bar {
    display: flex; gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--bg3);
    background: var(--bg);
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid #2d2550;
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Jost', sans-serif;
    outline: none;
    resize: none;
    max-height: 100px;
    -webkit-appearance: none;
  }
  .chat-input:focus { border-color: var(--purple); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d2550; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP SCREEN -->
  <div id="setup-screen" class="screen">
    <div class="setup-logo">NOVA</div>
    <div class="setup-sub">Расскажи мне о себе — один раз</div>

    <label class="field-label">Твоё имя</label>
    <input class="field-input" id="s-name" placeholder="Как тебя зовут?">

    <label class="field-label">Фокус этой недели</label>
    <input class="field-input" id="s-focus" placeholder="Например: найти первого клиента на Upwork">

    <label class="field-label">Что сейчас мешает больше всего</label>
    <input class="field-input" id="s-challenges" placeholder="Честно — что стопорит?">

    <label class="field-label">Твои цели (редактируй)</label>
    <div class="goals-grid">
      <input class="field-input" style="margin-bottom:0" id="g0" value="Финансовая независимость">
      <input class="field-input" style="margin-bottom:0" id="g1" value="Удалённая работа и бизнес">
      <input class="field-input" style="margin-bottom:0" id="g2" value="Творческое развитие">
      <input class="field-input" style="margin-bottom:0" id="g3" value="Найти своих людей в LA">
    </div>

    <label class="field-label">🔑 Anthropic API Key</label>
    <input class="field-input" id="s-apikey" type="password" placeholder="gsk_...">
    <div style="font-size:11px;color:#5a4f7a;margin-top:-14px;margin-bottom:20px;line-height:1.6;">Получить бесплатно на <strong style="color:#a78bfa">console.groq.com</strong> → API Keys → Create API Key.<br>Бесплатно · 14,400 запросов/день · Хранится только на твоём устройстве.</div>

    <button class="save-btn" onclick="saveProfile()">НАЧАТЬ С NOVA →</button>
    <button onclick="testApiKey()" style="width:100%;background:none;border:1px solid #2d2550;border-radius:14px;padding:13px;color:#7c3aed;font-size:14px;font-family:'Jost',sans-serif;cursor:pointer;margin-top:10px;">🔍 Проверить API ключ</button>
    <div id="key-status" style="text-align:center;font-size:13px;margin-top:10px;min-height:20px;"></div>
  </div>

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen">
    <div class="top-bar">
      <div>
        <div class="logo-small">NOVA</div>
        <div class="time-display" id="time-display"></div>
      </div>
      <button class="settings-btn" onclick="showSetup()">⚙️</button>
    </div>
    <div class="home-scroll">
      <div class="greet-card">
        <div class="greet-hello" id="greeting-text"></div>
        <div class="greet-focus" id="focus-text"></div>
        <div class="progress-label" id="progress-label">Задач выполнено: 0/10</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div class="section-label" id="block-label"></div>
      <div class="block-card" id="block-tasks"></div>

      <div class="block-tabs" id="block-tabs"></div>

      <div class="section-label">БЫСТРЫЕ ЗАПРОСЫ</div>
      <div class="prompt-grid" id="prompt-grid"></div>

      <div class="section-label">НАПИСАТЬ NOVA</div>
      <div class="home-input-row">
        <input class="home-input" id="home-input" placeholder="Любой вопрос или задача..." onkeydown="if(event.key==='Enter')sendFromHome()">
        <button class="send-btn" onclick="sendFromHome()">↑</button>
      </div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <div class="chat-header">
      <button class="back-btn" onclick="showHome()">← Главная</button>
      <div class="chat-title">NOVA</div>
      <div style="width:60px"></div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">Напиши что угодно или используй быстрые кнопки</div>
    </div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chat-input" placeholder="Напиши NOVA..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button class="send-btn" id="chat-send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>

</div>

<script>
const SCHEDULE = [
  { id:"morning", label:"Утро", emoji:"🌅", hours:"07:00–08:00", tasks:[
    "5 мин журналинг: 1 цель, 1 благодарность, 1 страх",
    "10 мин чтение (история / философия)",
    "15 мин английский: 1 статья, 5 новых слов",
    "Финансы или фриланс: 1 действие (30 мин)"
  ]},
  { id:"day", label:"День", emoji:"☀️", hours:"12:00–13:00", tasks:[
    "1 шаг по бизнес-цели",
    "LinkedIn / Upwork: 1 действие",
    "Написать 1 человеку для нетворкинга"
  ]},
  { id:"evening", label:"Вечер", emoji:"🌙", hours:"20:00–21:00", tasks:[
    "20 мин творчество (рисунок или письмо)",
    "Рефлексия: что сделала / не сделала",
    "1 шаг для LA-связей (meetup, сообщение)"
  ]},
];

const PROMPTS = [
  { icon:"📋", label:"План на сегодня",    fn: p => `Меня зовут ${p.name||"Nova"}. Я ${p.role||"инженер"} в LA. Фокус недели: "${p.focus||"развитие"}". Вызовы: ${p.challenges||"неизвестно"}. Дай мне конкретный план на сегодня — максимум 3 действия, каждое до 30 минут.` },
  { icon:"🧱", label:"Застряла — помоги", fn: p => `Я ${p.name||""}, инженер в LA. Застряла, не могу начать. Фокус: "${p.focus||"развитие"}". Дай мне 1 микро-шаг прямо сейчас на 5 минут.` },
  { icon:"🌙", label:"Вечерняя рефлексия", fn: p => `Меня зовут ${p.name||"Nova"}, инженер в LA. Помоги провести вечернюю рефлексию — задай мне 3 вопроса о прошедшем дне.` },
  { icon:"🎨", label:"Идея для творчества", fn: p => `Я ${p.name||""} — инженер и творческий человек в LA. Люблю визуальное искусство и письмо. Дай одну конкретную творческую идею на сегодня — рисунок или текст. Опиши концепцию подробно.` },
  { icon:"🤝", label:"Нетворкинг-сообщение", fn: p => `Я ${p.name||""}, software engineer из России, живу в LA. Напиши первое сообщение человеку с meetup. Тёплый тон, не навязчивый. На английском.` },
  { icon:"💰", label:"Финансовый урок", fn: p => `Я ${p.name||""}, живу в LA, инженер. Только начинаю разбираться в US финансах. Объясни один важный концепт — выбери сама что мне сейчас нужнее (ETF, ROTH IRA, tax brackets, emergency fund).` },
];

let profile = {};
let messages = [];
let checkedTasks = {};
let activeBlock = "morning";
let isLoading = false;

function loadData() {
  try {
    const p = localStorage.getItem("nova_profile");
    const t = localStorage.getItem("nova_tasks_" + todayKey());
    const m = localStorage.getItem("nova_messages");
    if (p) profile = JSON.parse(p);
    if (t) checkedTasks = JSON.parse(t);
    if (m) messages = JSON.parse(m);
  } catch(e) {}
}

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

async function testApiKey() {
  const keyEl = document.getElementById("s-apikey");
  const key = keyEl ? keyEl.value.trim() : localStorage.getItem("nova_api_key") || "";
  const status = document.getElementById("key-status");
  if (!key) { status.innerHTML = '<span style="color:#ef4444">⚠️ Введи API ключ выше</span>'; return; }
  status.innerHTML = '<span style="color:#a78bfa">Проверяю...</span>';
  try {
    const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${key}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: "Say OK" }],
        max_tokens: 5
      })
    });
    const data = await resp.json();
    if (data.error) {
      status.innerHTML = `<span style="color:#ef4444">❌ Ошибка: ${data.error.message}</span>`;
    } else {
      status.innerHTML = '<span style="color:#10b981">✓ Ключ работает! Можно сохранять.</span>';
    }
  } catch(e) {
    status.innerHTML = '<span style="color:#ef4444">❌ Нет соединения: ' + e.message + '</span>';
  }
}

function saveProfile() {
  const apiKeyInput = document.getElementById("s-apikey");
  const apiKey = apiKeyInput ? apiKeyInput.value.trim() : "";
  if (apiKey) {
    localStorage.setItem("nova_api_key", apiKey);
  }
  profile = {
    name: document.getElementById("s-name").value.trim(),
    focus: document.getElementById("s-focus").value.trim(),
    challenges: document.getElementById("s-challenges").value.trim(),
    goals: [0,1,2,3].map(i => document.getElementById("g"+i).value.trim()),
    role: "Software Engineer",
    savedAt: new Date().toISOString(),
  };
  localStorage.setItem("nova_profile", JSON.stringify(profile));
  // Confirm save
  const btn = document.querySelector(".save-btn");
  if (btn) { btn.textContent = "✓ СОХРАНЕНО"; setTimeout(() => { btn.textContent = "НАЧАТЬ С NOVA →"; }, 1500); }
  showHome();
}

function showSetup() {
  document.getElementById("s-name").value = profile.name||"";
  document.getElementById("s-focus").value = profile.focus||"";
  document.getElementById("s-challenges").value = profile.challenges||"";
  document.getElementById("s-apikey").value = localStorage.getItem("nova_api_key")||"";
  (profile.goals||[]).forEach((g,i) => {
    const el = document.getElementById("g"+i);
    if(el) el.value = g;
  });
  setScreen("setup");
}

function showHome() {
  setScreen("home");
  renderHome();
}

function showChat() {
  setScreen("chat");
}

function setScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(name+"-screen").classList.add("active");
}

function renderHome() {
  const now = new Date();
  const h = now.getHours();
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const timeStr = now.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("time-display").textContent = days[now.getDay()] + " · " + timeStr;

  const greet = h < 12 ? "Доброе утро" : h < 18 ? "Добрый день" : "Добрый вечер";
  document.getElementById("greeting-text").textContent = greet + (profile.name ? `, ${profile.name} 👋` : " 👋");

  const focusEl = document.getElementById("focus-text");
  if (profile.focus) {
    focusEl.innerHTML = `Фокус недели: <span>${profile.focus}</span>`;
  } else {
    focusEl.textContent = "Нажми ⚙️ чтобы добавить фокус недели";
  }

  // auto block by time
  if (h >= 5 && h < 11) activeBlock = "morning";
  else if (h >= 11 && h < 17) activeBlock = "day";
  else activeBlock = "evening";

  updateProgress();
  renderBlockTasks();
  renderBlockTabs();
  renderPrompts();
}

function updateProgress() {
  const total = SCHEDULE.reduce((a,b) => a+b.tasks.length, 0);
  const done = Object.values(checkedTasks).filter(Boolean).length;
  document.getElementById("progress-label").textContent = `Задач выполнено сегодня: ${done}/${total}`;
  document.getElementById("progress-fill").style.width = (done/total*100)+"%";
}

function renderBlockTasks() {
  const block = SCHEDULE.find(b => b.id === activeBlock);
  document.getElementById("block-label").textContent = `СЕЙЧАС · ${block.emoji} ${block.label.toUpperCase()} · ${block.hours}`;
  const container = document.getElementById("block-tasks");
  container.innerHTML = "";
  block.tasks.forEach((task, i) => {
    const key = `${activeBlock}-${i}`;
    const done = !!checkedTasks[key];
    const row = document.createElement("div");
    row.className = "task-row" + (done ? " done" : "");
    row.innerHTML = `
      <div class="task-check ${done?"checked":""}">${done?"✓":""}</div>
      <div class="task-text">${task}</div>
    `;
    row.onclick = () => {
      checkedTasks[key] = !checkedTasks[key];
      localStorage.setItem("nova_tasks_"+todayKey(), JSON.stringify(checkedTasks));
      renderBlockTasks();
      updateProgress();
    };
    container.appendChild(row);
  });
}

function renderBlockTabs() {
  const container = document.getElementById("block-tabs");
  container.innerHTML = "";
  SCHEDULE.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "block-tab" + (b.id === activeBlock ? " active" : "");
    btn.innerHTML = `<span class="tab-emoji">${b.emoji}</span>${b.label}`;
    btn.onclick = () => { activeBlock = b.id; renderBlockTasks(); renderBlockTabs(); };
    container.appendChild(btn);
  });
}

function renderPrompts() {
  const container = document.getElementById("prompt-grid");
  container.innerHTML = "";
  PROMPTS.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "prompt-btn";
    btn.innerHTML = `<span class="prompt-emoji">${p.icon}</span><span class="prompt-label">${p.label}</span>`;
    btn.onclick = () => {
      const text = p.fn(profile);
      sendMessage(text);
    };
    container.appendChild(btn);
  });
}

function sendFromHome() {
  const input = document.getElementById("home-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  sendMessage(text);
}

function sendChat() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = "";
  sendMessage(text);
}

async function sendMessage(text) {
  if (isLoading) return;
  if (!text || !text.trim()) return;
  // Always show chat screen first
  showChat();
  messages.push({ role:"user", content: text });
  renderChatMessages();
  isLoading = true;

  const systemPrompt = `Ты NOVA — персональный AI-ассистент и коуч. Ты помогаешь ${profile.name||"пользовательнице"} достичь финансовой независимости и построить желаемую жизнь.

Её профиль:
- Имя: ${profile.name||"не указано"}
- Роль: Software Engineer (Big Tech, Avito → LA)
- Локация: Los Angeles, CA
- Цели: ${(profile.goals||[]).join(", ")}
- Фокус недели: ${profile.focus||"не указан"}
- Вызовы: ${profile.challenges||"не указаны"}

Контекст: инженер из России, живёт в LA, есть asylum кейс в суде. Свободный английский. Хочет фриланс, инвестиции, творчество, сообщество в LA.

Стиль ответов:
- Всегда на русском языке
- Конкретные действия, не общие советы
- Тёплая, честная, прямая
- Максимум 4 абзаца или нумерованный список
- Заканчивай одним вопросом или призывом`;

  const apiKey = localStorage.getItem("nova_api_key");
  if (!apiKey) {
    messages.push({ role:"assistant", content:"⚠️ Нужен API ключ Groq.\n\n1. Зайди на console.groq.com\n2. API Keys → Create API Key\n3. Скопируй ключ и вставь в ⚙️\n\nБесплатно · 14,400 запросов в день!" });
    isLoading = false;
    renderChatMessages();
    return;
  }

  // Groq API — OpenAI-compatible format
  const groqMessages = [
    { role: "system", content: systemPrompt },
    ...messages
  ];

  try {
    const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: groqMessages,
        max_tokens: 1000,
        temperature: 0.8
      })
    });
    const data = await resp.json();
    if (data.error) {
      messages.push({ role:"assistant", content:"❌ Ошибка: " + data.error.message + "\n\nПроверь API ключ в ⚙️ настройках." });
    } else {
      const reply = data.choices?.[0]?.message?.content || "Что-то пошло не так. Попробуй снова.";
      messages.push({ role:"assistant", content: reply });
      localStorage.setItem("nova_messages", JSON.stringify(messages.slice(-20)));
    }
  } catch(e) {
    messages.push({ role:"assistant", content:"Ошибка соединения: " + e.message });
  }

  isLoading = false;
  console.log("sendMessage done, messages:", messages.length);
  renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById("chat-messages");
  const empty = document.getElementById("chat-empty");
  if (!container) return;
  if (messages.length === 0) {
    if (empty) empty.style.display = "block";
    return;
  }
  if (empty) empty.style.display = "none";
  container.innerHTML = "";

  messages.forEach(m => {
    const wrapper = document.createElement("div");
    wrapper.className = "msg " + m.role;
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = m.content;
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  });

  if (isLoading) {
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.innerHTML = "<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
    container.appendChild(typing);
  }

  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function updateClock() {
  const now = new Date();
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const timeStr = now.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
  const el = document.getElementById("time-display");
  if (el) el.textContent = days[now.getDay()] + " · " + timeStr;
}

// INIT
loadData();
if (!profile.name) {
  setScreen("setup");
} else {
  showHome();
}
setInterval(updateClock, 30000);
</script>
