<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOVA">
<meta name="theme-color" content="#08070f">
<title>NOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
</head>
<body>
<div id="app">

  <!-- ── AUTH ──────────────────────────────────────────── -->
  <div id="auth-screen" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 24px;">
      <div class="setup-logo">NOVA</div>
      <div class="setup-sub">твой персональный агент</div>
      <div style="height:32px"></div>
      <button class="save-btn" onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:1px;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.7-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.9l6.2 5.2C40.8 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Войти через Google
      </button>
      <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--text-faint)">или</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <label class="field-label">Email — получить ссылку</label>
      <input class="field-input" id="auth-email" type="email" placeholder="твой@email.com"
             onkeydown="if(event.key==='Enter')sendMagicLink()">
      <button class="save-btn" id="auth-btn" onclick="sendMagicLink()" style="background:none;border:1px solid var(--purple);color:var(--purple-light);">ВОЙТИ ПО ССЫЛКЕ →</button>
      <div id="auth-status" style="text-align:center;font-size:13px;margin-top:16px;line-height:1.7;color:var(--text-muted)"></div>
    </div>
  </div>

  <!-- ── SETUP ─────────────────────────────────────────── -->
  <div id="setup-screen" class="screen">
    <div style="overflow-y:auto;padding:48px 24px 40px;">
      <div class="setup-logo">NOVA</div>
      <div class="setup-sub">Расскажи мне о себе — один раз</div>

      <label class="field-label">Твоё имя</label>
      <input class="field-input" id="s-name" placeholder="Как тебя зовут?">

      <label class="field-label">Фокус этой недели</label>
      <input class="field-input" id="s-focus" placeholder="Например: восстановление и режим">

      <label class="field-label">Что сейчас мешает больше всего</label>
      <input class="field-input" id="s-challenges" placeholder="Честно — что стопорит?">

      <label class="field-label">Твои цели (редактируй)</label>
      <div class="goals-grid">
        <input class="field-input" style="margin-bottom:0" id="g0" value="Финансовая независимость">
        <input class="field-input" style="margin-bottom:0" id="g1" value="Удалённая работа и бизнес">
        <input class="field-input" style="margin-bottom:0" id="g2" value="Творческое развитие">
        <input class="field-input" style="margin-bottom:0" id="g3" value="Найти своих людей в LA">
      </div>

      <label class="field-label" style="margin-top:20px">Часовой пояс</label>
      <select class="field-input" id="s-timezone">
        <optgroup label="США">
          <option value="America/Los_Angeles">Los Angeles / San Francisco (UTC−8/−7)</option>
          <option value="America/Denver">Denver / Phoenix (UTC−7/−6)</option>
          <option value="America/Chicago">Chicago / Dallas (UTC−6/−5)</option>
          <option value="America/New_York">New York / Miami (UTC−5/−4)</option>
        </optgroup>
        <optgroup label="Европа">
          <option value="Europe/London">Лондон (UTC+0/+1)</option>
          <option value="Europe/Paris">Париж / Берлин / Рим (UTC+1/+2)</option>
          <option value="Europe/Helsinki">Хельсинки / Киев / Рига (UTC+2/+3)</option>
          <option value="Europe/Moscow">Москва / Санкт-Петербург (UTC+3)</option>
          <option value="Europe/Istanbul">Стамбул / Тбилиси (UTC+3)</option>
        </optgroup>
        <optgroup label="Азия">
          <option value="Asia/Dubai">Дубай / Абу-Даби (UTC+4)</option>
          <option value="Asia/Tashkent">Ташкент / Алматы (UTC+5/+6)</option>
          <option value="Asia/Kolkata">Мумбаи / Дели (UTC+5:30)</option>
          <option value="Asia/Bangkok">Бангкок / Джакарта (UTC+7)</option>
          <option value="Asia/Singapore">Сингапур / Куала-Лумпур (UTC+8)</option>
          <option value="Asia/Seoul">Сеул / Токио (UTC+9)</option>
        </optgroup>
        <optgroup label="Австралия / Океания">
          <option value="Australia/Sydney">Сидней / Мельбурн (UTC+10/+11)</option>
          <option value="Pacific/Auckland">Окленд (UTC+12/+13)</option>
        </optgroup>
      </select>

      <label class="field-label" style="margin-top:20px">🔑 Groq API Key</label>
      <input class="field-input" id="s-apikey" type="password" placeholder="gsk_...">
      <div style="font-size:11px;color:#5a4f7a;margin-top:-14px;margin-bottom:20px;line-height:1.6;">
        Бесплатно на <strong style="color:#a78bfa">console.groq.com</strong> → API Keys → Create API Key.
      </div>

      <button class="save-btn" onclick="saveProfile()">СОХРАНИТЬ →</button>
    </div>
  </div>

  <!-- ── HOME ──────────────────────────────────────────── -->
  <div id="home-screen" class="screen">
    <div class="top-bar">
      <div>
        <div class="logo-small">NOVA</div>
        <div class="time-display" id="time-display"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="showDayLog()"
                style="background:none;border:1px solid #2d2550;border-radius:8px;color:var(--text-faint);font-size:10px;letter-spacing:1px;padding:4px 8px;cursor:pointer;font-family:'Jost',sans-serif;">
          ЛОГ
        </button>
        <button onclick="debugResetDay()"
                style="background:none;border:1px solid #2d2550;border-radius:8px;color:var(--text-faint);font-size:10px;letter-spacing:1px;padding:4px 8px;cursor:pointer;font-family:'Jost',sans-serif;">
          DEV
        </button>
        <button class="settings-btn" onclick="showSetup()">⚙️</button>
      </div>
    </div>

    <div class="home-scroll">
      <div class="score-card" id="score-card">
        <div class="greet-hello" id="greeting-text"></div>
        <div class="score-row">
          <div class="score-value" id="score-value">—</div>
          <div>
            <div class="score-label">стакан состояния</div>
            <div class="score-zone" id="score-zone"></div>
          </div>
        </div>
        <div class="score-bar">
          <div class="score-fill" id="score-fill" style="width:0%"></div>
        </div>
        <div class="score-desc" id="score-desc"></div>
      </div>

      <div id="trackers-container"></div>
      <div id="mini-goals-container"></div>

      <div class="section-label" id="tasks-label">ЗАДАЧИ ДНЯ</div>
      <div class="block-card" id="daily-tasks-list">
        <div class="empty-state">Задачи появятся после первого опроса</div>
      </div>

      <div class="section-label">НАПИСАТЬ NOVA</div>
      <div class="home-input-row">
        <input class="home-input" id="home-input" placeholder="Любой вопрос..."
               onkeydown="if(event.key==='Enter')sendFromHome()">
        <button class="send-btn" onclick="sendFromHome()">↑</button>
      </div>
    </div>
  </div>

  <!-- ── SURVEY ─────────────────────────────────────────── -->
  <div id="survey-screen" class="screen">
    <div class="chat-header">
      <button class="back-btn" onclick="showHome()">← Главная</button>
      <div class="chat-title">ОПРОС</div>
      <div style="width:60px"></div>
    </div>
    <div class="survey-scroll" id="survey-body"></div>
  </div>

  <!-- ── CHAT ──────────────────────────────────────────── -->
  <div id="chat-screen" class="screen">
    <div class="chat-header">
      <button class="back-btn" onclick="showHome()">← Главная</button>
      <div class="chat-title">NOVA</div>
      <div style="width:60px"></div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">Напиши что угодно</div>
    </div>
    <div class="chat-input-bar">
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="Напиши NOVA..."
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="send-btn" id="chat-send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>

  <!-- ── DAY LOG OVERLAY ───────────────────────────────── -->
  <div id="daylog-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;">
    <div class="chat-header">
      <button onclick="closeDayLog()" style="background:none;border:none;color:var(--purple-light);cursor:pointer;font-size:14px;font-family:'Jost',sans-serif;padding:4px 0;">← Назад</button>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:4px;color:var(--purple-light);font-weight:300;">ЖУРНАЛ</div>
      <div style="width:60px"></div>
    </div>
    <div id="daylog-body" style="flex:1;overflow-y:auto;padding:24px 20px 60px;-webkit-overflow-scrolling:touch;"></div>
  </div>

  <!-- ── JOURNAL OVERLAY ──────────────────────────────── -->
  <div id="journal-overlay" style="display:none;position:fixed;inset:0;background:rgba(8,7,15,0.97);z-index:200;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px;border-bottom:1px solid var(--bg3);flex-shrink:0;">
      <button onclick="closeJournal()" style="background:none;border:none;color:var(--purple-light);cursor:pointer;font-size:14px;font-family:'Jost',sans-serif;padding:4px 0;">← Назад</button>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:4px;color:var(--purple-light);font-weight:300;">ДНЕВНИК</div>
      <div style="width:60px"></div>
    </div>
    <div id="journal-body" style="flex:1;overflow-y:auto;padding:24px 18px 60px;-webkit-overflow-scrolling:touch;"></div>
  </div>

</div>
<script src="js/state.js"></script>
<script src="js/daylog.js"></script>
<script src="js/score.js"></script>
<script src="js/chat.js"></script>
<script src="js/journal.js"></script>
<script src="js/home.js"></script>
<script src="js/survey.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
