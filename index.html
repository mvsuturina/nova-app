<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOVA">
<meta name="theme-color" content="#08070f">
<title>NOVA — Мой агент</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08070f; --bg2: #0e0c18; --bg3: #13111f;
    --border: #1e1a30; --purple: #7c3aed; --purple-light: #a78bfa;
    --purple-dim: #2d1f4e; --text: #e8e0ff; --text-dim: #9b85c4;
    --text-muted: #5a4f7a; --text-faint: #3d3560;
    --green: #10b981; --gold: #f59e0b;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; -webkit-font-smoothing: antialiased; }
  #app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }
  .screen { display: none; flex-direction: column; height: 100%; }
  .screen.active { display: flex; }

  /* AUTH */
  #auth-screen { justify-content: center; padding: 40px 24px; overflow-y: auto; }

  /* SETUP */
  #setup-screen { overflow-y: auto; padding: 48px 24px 40px; }
  .setup-logo { font-family: 'Cormorant Garamond', serif; font-size: 48px; letter-spacing: 12px; color: var(--purple-light); text-align: center; margin-bottom: 6px; font-weight: 300; }
  .setup-sub { text-align: center; font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 40px; font-family: 'Cormorant Garamond', serif; }
  .field-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .field-input { width: 100%; background: var(--bg2); border: 1px solid #2d2550; border-radius: 12px; padding: 13px 16px; color: var(--text); font-size: 15px; font-family: 'Jost', sans-serif; outline: none; margin-bottom: 20px; transition: border-color 0.2s; }
  .field-input:focus { border-color: var(--purple); }
  .goals-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .save-btn { width: 100%; background: linear-gradient(135deg, var(--purple), #5b21b6); border: none; border-radius: 14px; padding: 16px; color: white; font-size: 15px; font-family: 'Jost', sans-serif; letter-spacing: 2px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .save-btn:active { opacity: 0.8; }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  /* HOME */
  #home-screen { overflow: hidden; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 14px; border-bottom: 1px solid var(--bg3); flex-shrink: 0; }
  .logo-small { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 6px; color: var(--purple-light); font-weight: 300; }
  .time-display { font-size: 11px; color: var(--text-faint); margin-top: 2px; letter-spacing: 1px; }
  .settings-btn { background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.4; padding: 4px; }
  .home-scroll { flex: 1; overflow-y: auto; padding: 0 18px 100px; -webkit-overflow-scrolling: touch; }

  .greet-card { background: linear-gradient(135deg, #1a0d33 0%, #0d1b2a 100%); border: 1px solid var(--purple-dim); border-radius: 18px; padding: 20px; margin-top: 18px; margin-bottom: 22px; animation: fadeUp 0.4s ease; }
  .greet-hello { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--text); margin-bottom: 6px; font-weight: 300; }
  .greet-focus { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
  .greet-focus span { color: var(--purple-light); }
  .progress-label { font-size: 10px; letter-spacing: 2px; color: var(--text-faint); margin-bottom: 6px; }
  .progress-bar { background: #1a1530; border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light)); border-radius: 4px; transition: width 0.6s ease; }

  .section-label { font-size: 9px; letter-spacing: 3px; color: var(--text-faint); margin-bottom: 10px; margin-top: 6px; text-transform: uppercase; }

  .block-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 4px 16px; margin-bottom: 20px; }
  .task-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--bg3); cursor: pointer; transition: opacity 0.2s; }
  .task-row:last-child { border-bottom: none; }
  .task-row.done { opacity: 0.35; }
  .task-check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid #4c3d8a; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; margin-top: 1px; transition: all 0.2s; }
  .task-check.checked { background: var(--purple); border-color: var(--purple); }
  .task-text { font-size: 14px; color: #d4caff; line-height: 1.5; flex: 1; }
  .task-row.done .task-text { text-decoration: line-through; color: var(--text-muted); }
  .streak-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--purple-dim); border: 1px solid var(--purple); border-radius: 20px; padding: 1px 8px; font-size: 10px; color: var(--purple-light); margin-left: 6px; vertical-align: middle; }

  .block-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .block-tab { flex: 1; padding: 11px 6px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; text-align: center; font-size: 11px; font-family: 'Jost', sans-serif; transition: all 0.2s; }
  .block-tab.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple-light); }
  .block-tab .tab-emoji { font-size: 18px; display: block; margin-bottom: 3px; }

  .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .prompt-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; cursor: pointer; text-align: center; font-family: 'Jost', sans-serif; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .prompt-btn:active { background: var(--bg3); transform: scale(0.97); }
  .prompt-emoji { font-size: 22px; display: block; margin-bottom: 6px; }
  .prompt-label { font-size: 12px; color: var(--purple-light); line-height: 1.4; }

  .home-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .home-input { flex: 1; background: var(--bg2); border: 1px solid #2d2550; border-radius: 14px; padding: 13px 16px; color: var(--text); font-size: 14px; font-family: 'Jost', sans-serif; outline: none; }
  .home-input:focus { border-color: var(--purple); }
  .send-btn { background: var(--purple); border: none; border-radius: 14px; width: 48px; color: white; font-size: 20px; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
  .send-btn:active { opacity: 0.7; }
  .send-btn:disabled { opacity: 0.3; cursor: default; }

  /* CHAT */
  #chat-screen { overflow: hidden; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--bg3); flex-shrink: 0; }
  .back-btn { background: none; border: none; color: var(--purple-light); cursor: pointer; font-size: 14px; font-family: 'Jost', sans-serif; padding: 4px 0; }
  .chat-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 4px; color: var(--purple-light); font-weight: 300; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
  .chat-empty { color: var(--text-faint); font-size: 14px; text-align: center; margin-top: 60px; font-style: italic; font-family: 'Cormorant Garamond', serif; }
  .msg { display: flex; max-width: 82%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .msg.user .msg-bubble { background: #5b21b6; color: var(--text); border-radius: 18px 18px 4px 18px; }
  .msg.assistant .msg-bubble { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; }
  .typing { display: flex; gap: 5px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; width: fit-content; align-self: flex-start; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .chat-input-bar { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--bg3); background: var(--bg); flex-shrink: 0; }
  .chat-input { flex: 1; background: var(--bg2); border: 1px solid #2d2550; border-radius: 14px; padding: 12px 16px; color: var(--text); font-size: 14px; font-family: 'Jost', sans-serif; outline: none; resize: none; max-height: 100px; -webkit-appearance: none; }
  .chat-input:focus { border-color: var(--purple); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d2550; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 24px;">
      <div class="setup-logo">NOVA</div>
      <div class="setup-sub">твой персональный агент</div>
      <div style="height:32px"></div>
      <button class="save-btn" onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:1px;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 18.9 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.7-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.9l6.2 5.2C40.8 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Войти через Google
      </button>
      <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--text-faint)">или</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <label class="field-label">Email — получить ссылку</label>
      <input class="field-input" id="auth-email" type="email" placeholder="твой@email.com"
             onkeydown="if(event.key==='Enter')sendMagicLink()">
      <button class="save-btn" id="auth-btn" onclick="sendMagicLink()" style="background:none;border:1px solid var(--purple);color:var(--purple-light);">ВОЙТИ ПО ССЫЛКЕ →</button>
      <div id="auth-status" style="text-align:center;font-size:13px;margin-top:16px;line-height:1.7;color:var(--text-muted)"></div>
    </div>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setup-screen" class="screen">
    <div style="overflow-y:auto;padding:48px 24px 40px;">
      <div class="setup-logo">NOVA</div>
      <div class="setup-sub">Расскажи мне о себе — один раз</div>

      <label class="field-label">Твоё имя</label>
      <input class="field-input" id="s-name" placeholder="Как тебя зовут?">

      <label class="field-label">Фокус этой недели</label>
      <input class="field-input" id="s-focus" placeholder="Например: найти первого клиента на Upwork">

      <label class="field-label">Что сейчас мешает больше всего</label>
      <input class="field-input" id="s-challenges" placeholder="Честно — что стопорит?">

      <label class="field-label">Твои цели (редактируй)</label>
      <div class="goals-grid">
        <input class="field-input" style="margin-bottom:0" id="g0" value="Финансовая независимость">
        <input class="field-input" style="margin-bottom:0" id="g1" value="Удалённая работа и бизнес">
        <input class="field-input" style="margin-bottom:0" id="g2" value="Творческое развитие">
        <input class="field-input" style="margin-bottom:0" id="g3" value="Найти своих людей в LA">
      </div>

      <label class="field-label" style="margin-top:20px">🔑 Groq API Key</label>
      <input class="field-input" id="s-apikey" type="password" placeholder="gsk_...">
      <div style="font-size:11px;color:#5a4f7a;margin-top:-14px;margin-bottom:20px;line-height:1.6;">
        Бесплатно на <strong style="color:#a78bfa">console.groq.com</strong> → API Keys → Create API Key.
      </div>

      <button class="save-btn" onclick="saveProfile()">СОХРАНИТЬ →</button>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen">
    <div class="top-bar">
      <div>
        <div class="logo-small">NOVA</div>
        <div class="time-display" id="time-display"></div>
      </div>
      <button class="settings-btn" onclick="showSetup()">⚙️</button>
    </div>
    <div class="home-scroll">
      <div class="greet-card">
        <div class="greet-hello" id="greeting-text"></div>
        <div class="greet-focus" id="focus-text"></div>
        <div class="progress-label" id="progress-label">Задач выполнено: 0/10</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="section-label" id="block-label"></div>
      <div class="block-card" id="block-tasks"></div>
      <div class="block-tabs" id="block-tabs"></div>
      <div class="section-label">БЫСТРЫЕ ЗАПРОСЫ</div>
      <div class="prompt-grid" id="prompt-grid"></div>
      <div class="section-label">НАПИСАТЬ NOVA</div>
      <div class="home-input-row">
        <input class="home-input" id="home-input" placeholder="Любой вопрос или задача..."
               onkeydown="if(event.key==='Enter')sendFromHome()">
        <button class="send-btn" onclick="sendFromHome()">↑</button>
      </div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <div class="chat-header">
      <button class="back-btn" onclick="showHome()">← Главная</button>
      <div class="chat-title">NOVA</div>
      <div style="width:60px"></div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">Напиши что угодно или используй быстрые кнопки</div>
    </div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chat-input" placeholder="Напиши NOVA..."
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button class="send-btn" id="chat-send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>

</div>
<script>
// ── CONFIG — вставь свои значения из Supabase ─────────────
const SUPABASE_URL      = 'https://unckamxhresccxorkkkw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuY2thbXhocmVzY2N4b3Jra2t3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTc3MDUsImV4cCI6MjA5NDk3MzcwNX0.lmI-FxrhspQ8k7ogIbFAeetlBq_oNlnLo9x-wRd3M54';

// ── РАСПИСАНИЕ ────────────────────────────────────────────
const SCHEDULE = [
  { id:"morning", label:"Утро", emoji:"🌅", hours:"07:00–08:00", tasks:[
    "5 мин журналинг: 1 цель, 1 благодарность, 1 страх",
    "10 мин чтение (история / философия)",
    "15 мин английский: 1 статья, 5 новых слов",
    "Финансы или фриланс: 1 действие (30 мин)"
  ]},
  { id:"day", label:"День", emoji:"☀️", hours:"12:00–13:00", tasks:[
    "1 шаг по бизнес-цели",
    "LinkedIn / Upwork: 1 действие",
    "Написать 1 человеку для нетворкинга"
  ]},
  { id:"evening", label:"Вечер", emoji:"🌙", hours:"20:00–21:00", tasks:[
    "20 мин творчество (рисунок или письмо)",
    "Рефлексия: что сделала / не сделала",
    "1 шаг для LA-связей (meetup, сообщение)"
  ]},
];

const PROMPTS = [
  { icon:"📋", label:"План на сегодня",    fn: p => mkPrompt("plan", p) },
  { icon:"🧱", label:"Застряла — помоги", fn: p => mkPrompt("stuck", p) },
  { icon:"🌙", label:"Вечерняя рефлексия", fn: p => mkPrompt("reflect", p) },
  { icon:"🎨", label:"Идея для творчества", fn: p => mkPrompt("creative", p) },
  { icon:"🤝", label:"Нетворкинг-сообщение", fn: p => mkPrompt("network", p) },
  { icon:"💰", label:"Финансовый урок",     fn: p => mkPrompt("finance", p) },
];

// ── СОСТОЯНИЕ ─────────────────────────────────────────────
let sb = null;
let currentUser = null;
let profile = {};
let messages = [];
let checkedTasks = {};
let taskHistory = {};
let activeBlock = "morning";
let isLoading = false;

// ── INIT ──────────────────────────────────────────────────
async function initApp() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await loadUserData();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null; profile = {}; messages = []; checkedTasks = {};
      setScreen('auth');
    }
  });

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadUserData();
  } else {
    setScreen('auth');
  }
}

// ── AUTH ──────────────────────────────────────────────────
async function signInWithGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://mvsuturina.github.io/nova-app/' }
  });
}

async function sendMagicLink() {
  const email = document.getElementById('auth-email').value.trim();
  const status = document.getElementById('auth-status');
  const btn = document.getElementById('auth-btn');
  if (!email) { status.textContent = 'Введи email'; return; }
  btn.disabled = true; btn.textContent = 'Отправляю...';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });

  if (error) {
    status.innerHTML = `<span style="color:#ef4444">Ошибка: ${error.message}</span>`;
    btn.disabled = false; btn.textContent = 'ВОЙТИ →';
  } else {
    status.innerHTML = `✉️ Ссылка отправлена на <strong style="color:var(--purple-light)">${email}</strong><br><br>Открой письмо и нажми кнопку — вернёшься уже авторизованной.`;
  }
}

// ── ЗАГРУЗКА ДАННЫХ ───────────────────────────────────────
async function loadUserData() {
  const { data: pd } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  if (pd) { profile = pd; if (pd.groq_api_key) localStorage.setItem('nova_api_key', pd.groq_api_key); }

  const today = todayKey();
  const { data: td } = await sb.from('task_logs').select('block_id,task_index')
    .eq('user_id', currentUser.id).eq('completed_at', today);
  checkedTasks = {};
  if (td) td.forEach(t => { checkedTasks[`${t.block_id}-${t.task_index}`] = true; });

  // История за 30 дней для стриков
  const from = new Date(); from.setDate(from.getDate() - 30);
  const { data: hd } = await sb.from('task_logs')
    .select('block_id,task_index,completed_at')
    .eq('user_id', currentUser.id)
    .gte('completed_at', from.toISOString().slice(0,10));
  taskHistory = {};
  if (hd) hd.forEach(t => {
    if (!taskHistory[t.completed_at]) taskHistory[t.completed_at] = {};
    taskHistory[t.completed_at][`${t.block_id}-${t.task_index}`] = true;
  });

  const { data: md } = await sb.from('chat_messages').select('role,content')
    .eq('user_id', currentUser.id).order('created_at', { ascending: true }).limit(30);
  if (md) messages = md;

  if (!profile.name) setScreen('setup');
  else showHome();
}

// ── ПРОФИЛЬ ───────────────────────────────────────────────
async function saveProfile() {
  const apiKey = document.getElementById('s-apikey').value.trim();
  const newProfile = {
    id: currentUser.id,
    name: document.getElementById('s-name').value.trim(),
    focus: document.getElementById('s-focus').value.trim(),
    challenges: document.getElementById('s-challenges').value.trim(),
    goals: [0,1,2,3].map(i => document.getElementById('g'+i).value.trim()),
    role: 'Software Engineer',
    groq_api_key: apiKey || profile.groq_api_key || '',
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('profiles').upsert(newProfile);
  if (!error) {
    profile = newProfile;
    if (apiKey) localStorage.setItem('nova_api_key', apiKey);
    const btn = document.querySelector('.save-btn');
    if (btn) { btn.textContent = '✓ СОХРАНЕНО'; setTimeout(() => btn.textContent = 'СОХРАНИТЬ →', 1500); }
    showHome();
  }
}

function showSetup() {
  document.getElementById('s-name').value = profile.name || '';
  document.getElementById('s-focus').value = profile.focus || '';
  document.getElementById('s-challenges').value = profile.challenges || '';
  document.getElementById('s-apikey').value = profile.groq_api_key || '';
  (profile.goals || []).forEach((g, i) => { const el = document.getElementById('g'+i); if (el) el.value = g; });
  setScreen('setup');
}

// ── ЗАДАЧИ ────────────────────────────────────────────────
async function toggleTask(blockId, taskIndex, taskText) {
  const key = `${blockId}-${taskIndex}`;
  const wasDone = !!checkedTasks[key];
  const today = todayKey();

  if (!wasDone) {
    checkedTasks[key] = true;
    if (!taskHistory[today]) taskHistory[today] = {};
    taskHistory[today][key] = true;
    await sb.from('task_logs').upsert({
      user_id: currentUser.id, block_id: blockId,
      task_index: taskIndex, task_text: taskText, completed_at: today,
    });
    const streak = getStreak(key);
    let msg = `Выполнила: "${taskText}"`;
    if (streak > 1) msg += ` (${streak} дней подряд!)`;
    msg += `. Что посоветуешь дальше с учётом этого?`;
    sendMessage(msg);
  } else {
    checkedTasks[key] = false;
    if (taskHistory[today]) delete taskHistory[today][key];
    await sb.from('task_logs').delete()
      .eq('user_id', currentUser.id).eq('block_id', blockId)
      .eq('task_index', taskIndex).eq('completed_at', today);
    renderBlockTasks();
    updateProgress();
  }
}

function getStreak(key) {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 30; i++) {
    if (taskHistory[d.toISOString().slice(0,10)]?.[key]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

// ── ЭКРАНЫ ────────────────────────────────────────────────
function setScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
}
function showHome() { setScreen('home'); renderHome(); }
function showChat() { setScreen('chat'); }

// ── HOME ──────────────────────────────────────────────────
function renderHome() {
  const now = new Date(), h = now.getHours();
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  document.getElementById('time-display').textContent = days[now.getDay()] + ' · ' + now.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
  const greet = h < 12 ? "Доброе утро" : h < 18 ? "Добрый день" : "Добрый вечер";
  document.getElementById('greeting-text').textContent = greet + (profile.name ? `, ${profile.name} 👋` : " 👋");
  const fe = document.getElementById('focus-text');
  if (profile.focus) fe.innerHTML = `Фокус недели: <span>${profile.focus}</span>`;
  else fe.textContent = "Нажми ⚙️ чтобы добавить фокус недели";
  if (h >= 5 && h < 11) activeBlock = "morning";
  else if (h >= 11 && h < 17) activeBlock = "day";
  else activeBlock = "evening";
  updateProgress(); renderBlockTasks(); renderBlockTabs(); renderPrompts();
}

function updateProgress() {
  const total = SCHEDULE.reduce((a,b) => a+b.tasks.length, 0);
  const done = Object.values(checkedTasks).filter(Boolean).length;
  document.getElementById('progress-label').textContent = `Задач выполнено сегодня: ${done}/${total}`;
  document.getElementById('progress-fill').style.width = (done/total*100)+'%';
}

function renderBlockTasks() {
  const block = SCHEDULE.find(b => b.id === activeBlock);
  document.getElementById('block-label').textContent = `СЕЙЧАС · ${block.emoji} ${block.label.toUpperCase()} · ${block.hours}`;
  const container = document.getElementById('block-tasks');
  container.innerHTML = '';
  block.tasks.forEach((task, i) => {
    const key = `${activeBlock}-${i}`;
    const done = !!checkedTasks[key];
    const streak = getStreak(key);
    const row = document.createElement('div');
    row.className = 'task-row' + (done ? ' done' : '');
    row.innerHTML = `
      <div class="task-check ${done?'checked':''}">${done?'✓':''}</div>
      <div class="task-text">${task}${streak > 1 ? `<span class="streak-badge">🔥 ${streak}</span>` : ''}</div>`;
    row.onclick = () => toggleTask(activeBlock, i, task);
    container.appendChild(row);
  });
}

function renderBlockTabs() {
  const container = document.getElementById('block-tabs');
  container.innerHTML = '';
  SCHEDULE.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'block-tab' + (b.id === activeBlock ? ' active' : '');
    btn.innerHTML = `<span class="tab-emoji">${b.emoji}</span>${b.label}`;
    btn.onclick = () => { activeBlock = b.id; renderBlockTasks(); renderBlockTabs(); };
    container.appendChild(btn);
  });
}

function renderPrompts() {
  const container = document.getElementById('prompt-grid');
  container.innerHTML = '';
  PROMPTS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'prompt-btn';
    btn.innerHTML = `<span class="prompt-emoji">${p.icon}</span><span class="prompt-label">${p.label}</span>`;
    btn.onclick = () => sendMessage(p.fn(profile));
    container.appendChild(btn);
  });
}

// ── КОНТЕКСТ ДНЯ ─────────────────────────────────────────
function getTodayContext() {
  const done = [], notDone = [];
  SCHEDULE.forEach(b => b.tasks.forEach((task, i) => {
    (checkedTasks[`${b.id}-${i}`] ? done : notDone).push(task);
  }));
  let ctx = '';
  if (done.length) ctx += `Уже выполнила сегодня: ${done.join('; ')}. `;
  if (notDone.length) ctx += `Ещё не сделала: ${notDone.join('; ')}.`;
  return ctx;
}

function mkPrompt(type, p) {
  const ctx = getTodayContext();
  const base = {
    plan:     `Меня зовут ${p.name||"Nova"}. Фокус недели: "${p.focus||"развитие"}". Вызовы: ${p.challenges||"неизвестно"}.\n${ctx}\nДай конкретный план на сегодня — максимум 3 действия, каждое до 30 минут.`,
    stuck:    `Я ${p.name||""}, застряла, не могу начать. Фокус: "${p.focus||"развитие"}".\n${ctx}\nДай 1 микро-шаг прямо сейчас на 5 минут.`,
    reflect:  `Меня зовут ${p.name||"Nova"}.\n${ctx}\nПомоги провести вечернюю рефлексию — задай 3 вопроса с учётом того, что я сделала сегодня.`,
    creative: `Я ${p.name||""} — инженер и творческий человек в LA.\n${ctx}\nДай одну конкретную творческую идею на сегодня.`,
    network:  `Я ${p.name||""}, software engineer из России, живу в LA.\n${ctx}\nНапиши первое сообщение человеку с meetup. Тёплый тон. На английском.`,
    finance:  `Я ${p.name||""}, живу в LA, инженер. ${ctx}\nОбъясни один важный финансовый концепт — выбери сама что мне сейчас нужнее.`,
  };
  return base[type] || base.plan;
}

// ── ЧАТ ───────────────────────────────────────────────────
function sendFromHome() {
  const input = document.getElementById('home-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendMessage(text);
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  sendMessage(text);
}

async function sendMessage(text) {
  if (isLoading || !text?.trim()) return;
  showChat();
  messages.push({ role: 'user', content: text });
  renderChatMessages();
  isLoading = true;

  await sb.from('chat_messages').insert({ user_id: currentUser.id, role: 'user', content: text });

  const systemPrompt = `Ты NOVA — персональный AI-ассистент и коуч. Помогаешь ${profile.name||"пользовательнице"} достичь финансовой независимости и построить желаемую жизнь.

Профиль:
- Имя: ${profile.name||"не указано"}
- Роль: Software Engineer (Big Tech, Avito → LA)
- Локация: Los Angeles, CA
- Цели: ${(profile.goals||[]).join(", ")}
- Фокус недели: ${profile.focus||"не указан"}
- Вызовы: ${profile.challenges||"не указаны"}

Контекст сегодня:
${getTodayContext() || "Задачи ещё не начаты"}

Стиль ответов:
- Всегда на русском языке
- Конкретные действия, не общие советы
- Тёплая, честная, прямая
- Максимум 4 абзаца или нумерованный список
- Учитывай что уже сделано — не повторяй выполненные задачи
- Заканчивай одним вопросом или призывом`;

  const apiKey = profile.groq_api_key || localStorage.getItem('nova_api_key');
  if (!apiKey) {
    messages.push({ role:'assistant', content:"⚠️ Нужен API ключ Groq. Зайди в ⚙️ настройки." });
    isLoading = false; renderChatMessages(); return;
  }

  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
        max_tokens: 1000, temperature: 0.8
      })
    });
    const data = await resp.json();
    if (data.error) {
      messages.push({ role:'assistant', content:'❌ Ошибка: ' + data.error.message });
    } else {
      const reply = data.choices?.[0]?.message?.content || 'Что-то пошло не так.';
      messages.push({ role:'assistant', content: reply });
      await sb.from('chat_messages').insert({ user_id: currentUser.id, role: 'assistant', content: reply });
      if (messages.length > 40) messages = messages.slice(-40);
    }
  } catch(e) {
    messages.push({ role:'assistant', content:'Ошибка соединения: ' + e.message });
  }

  isLoading = false;
  renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('chat-empty');
  if (!container) return;
  if (messages.length === 0) { if (empty) empty.style.display = 'block'; return; }
  if (empty) empty.style.display = 'none';
  container.innerHTML = '';
  messages.forEach(m => {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + m.role;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = m.content;
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  });
  if (isLoading) {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = "<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
    container.appendChild(typing);
  }
  requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
}

// ── УТИЛИТЫ ───────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }
function updateClock() {
  const now = new Date();
  const days = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
  const el = document.getElementById('time-display');
  if (el) el.textContent = days[now.getDay()] + ' · ' + now.toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
}

initApp();
setInterval(updateClock, 30000);
</script>
